name: Build and Publish to CR

on:
   push:
     branches: [ "main" ]
   workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write


    services:
      home-and-garden-test-db:
        image: postgres
        ports:
          - "5432:5432"
        env:
          POSTGRES_PASSWORD: "PASSWORD"
          POSTGRES_USER: "USERNAME"
          POSTGRES_DB: "home_and_garden"

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Add secret properties
        run: echo "${{ secrets.SECRET_PROPERTIES }}" > secret.properties

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Save the JAR file as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: home-and-garden-jar
          path: target/*.jar

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # Normally this would go into the secrets storage, but because
      # it is a short-lived environment, we can simplify a little bit.
      DB_USER: "USERNAME"
      DB_PASSWORD: "PASSWORD"

    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Download the JAR file from the 'build' job
        uses: actions/download-artifact@v4
        with:
          name: home-and-garden-jar
          path: .

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: Build the Docker image
        uses: docker/build-action@v5
        with:
          tags: ghcr.io/yuliavladimirov/home-and-garden-demo:latest
          file: ./Dockerfile

      - name: Run hurl integration tests
        run: |
          echo "${{ secrets.SECRET_PROPERTIES }}" > secret.properties
          docker compose -f docker-compose.yml -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from hurl-runner --build

      - name: Push the Docker image to Container Registry
        uses: docker/push-action@v5
        with:
          tags: ghcr.io/yuliavladimirov/home-and-garden-demo:latest
