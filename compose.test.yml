
services:

  hurl-tests:
    image: ghcr.io/orange-opensource/hurl:7.0.0
    volumes:
      - ./tests:/tests
#    working_dir: /tests
    depends_on:
      app:
        condition: service_healthy
    command: ["--test", "--verbose", "--color", "--glob", "--connect-to", "localhost:8080:app:8080", "/tests/*.hurl"]